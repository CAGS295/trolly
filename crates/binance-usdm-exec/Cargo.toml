[package]
name = "binance-usdm-exec"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1.20.1", features = ["sync", "net", "io-util", "rt"] }
tokio-native-tls = "0.3"
native-tls = { version = "0.2", features = ["vendored"] }
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
tracing = "0.1.36"
trolly-stream = { path = "../trolly-stream" }
trolly-strategy = { path = "../trolly-strategy" }

[dev-dependencies]
tokio = { version = "1.20.1", features = ["macros", "rt", "rt-multi-thread"] }
