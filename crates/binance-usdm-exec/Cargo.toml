[package]
name = "binance-usdm-exec"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1.20.1", features = ["sync"] }
tracing = "0.1.36"
trolly-stream = { path = "../trolly-stream" }

[dev-dependencies]
tokio = { version = "1.20.1", features = ["macros", "rt"] }
